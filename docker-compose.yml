services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - "${DB_DIR:-./db}:/var/lib/postgresql/data"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-memory}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-memory}"
      POSTGRES_DB: "${POSTGRES_DB:-memory}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memory} -d ${POSTGRES_DB:-memory}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: "${VERSION:-dev}"
    image: memory:${VERSION:-dev}
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-memory}:${POSTGRES_PASSWORD:-memory}@postgres:5432/${POSTGRES_DB:-memory}?sslmode=disable"
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: "${OLLAMA_MODEL:-nomic-embed-text}"
      EMBEDDING_DIM: "${EMBEDDING_DIM:-768}"
      HTTP_ADDR: ":8080"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      TEAM_ID: "${TEAM_ID:-default}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}"
      AGENT_MODEL: "${AGENT_MODEL:-claude-sonnet-4-6}"
      PIPELINE_INTERVAL: "${PIPELINE_INTERVAL:-1h}"
      PIPELINE_MIN_ENTRIES: "${PIPELINE_MIN_ENTRIES:-10}"
      CLUSTER_THRESHOLD: "${CLUSTER_THRESHOLD:-0.85}"
      SUPERADMIN_KEY: "${SUPERADMIN_KEY:-}"
      DEV_BYPASS_AUTH: "${DEV_BYPASS_AUTH:-false}"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
        required: false
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - "${OLLAMA_DATA_DIR:-./ollama-data}:/root/.ollama"
    # GPU passthrough (uncomment if host has NVIDIA drivers):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped
    profiles:
      - ollama   # only started when: docker compose --profile ollama up
